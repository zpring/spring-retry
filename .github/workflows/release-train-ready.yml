name: "Release Train – Ready"
run-name: "${{ inputs.release-train }} – Ready"
"on":
  workflow_dispatch:
    inputs:
      release-train:
        description: "Name of the release train"
        required: true
        type: "string"
      release-train-repository:
        description: "Repository that is orchestrating the release train"
        required: true
        type: "string"
permissions:
  contents: "none"
jobs:
  ready:
    name: "Ready"
    runs-on: "ubuntu-latest"
    steps:
    - name: "Ready"
      id: "ready"
      env:
        GH_TOKEN: "${{ secrets.ACTIONS_RELEASE_TOKEN }}"
      run: "gh workflow run ready --repo ${{ inputs.release-train-repository }} --ref ${{ inputs.release-train }} --field release-branch=${{ github.ref_name }} --field release-repository=${{ github.repository }}"
