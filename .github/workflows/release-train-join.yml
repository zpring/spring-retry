name: "Release Train – Join"
run-name: "${{ inputs.release-train }} – Join"
"on":
  workflow_dispatch:
    inputs:
      deployment-destination:
        description: "Destination to which the release should be deployed"
        options:
        - "Maven Central"
        - "Spring Enterprise"
        required: true
        type: "choice"
      release-train:
        description: "Name of the release train"
        required: true
        type: "string"
      release-train-repository:
        description: "Repository that is orchestrating the release train"
        required: true
        type: "string"
permissions:
  contents: "none"
jobs:
  join-release-train:
    name: "Join Release Train"
    runs-on: "ubuntu-latest"
    steps:
    - name: "Join Release Train"
      id: "join-release-train"
      env:
        GH_TOKEN: "${{ secrets.ACTIONS_RELEASE_TOKEN }}"
      run: "gh workflow run join --repo ${{ inputs.release-train-repository }} --ref ${{ inputs.release-train }} --field deployment-destination=${{ inputs.deployment-destination == 'Maven Central' && 'maven-central' || 'spring-enterprise' }} --field release-branch=${{ github.ref_name }} --field release-repository=${{ github.repository }}"
